name: PR Review
on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Run Codex PR Review
        uses: team-telnyx/reviewpr-internal@main
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_event_number: ${{ github.event.inputs.pr_number }}
